<!DOCTYPE html>
<html>
<link rel="stylesheet" href="style.css">
<head>

<title>Happy Birthday 🎂</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

height:100vh;

display:flex;

justify-content:center;

align-items:center;

background:linear-gradient(to bottom,#87CEEB,#BDEBFF,#EAF9FF);

overflow:hidden;

font-family:'Press Start 2P', cursive;
}

.card{

background:rgba(255,255,255,0.92);
padding:40px;
border-radius:30px;
text-align:center;
width:90%;
max-width:520px;
box-shadow:0 20px 45px rgba(0,0,0,0.2);
backdrop-filter:blur(8px);
animation:pop 1s;
position:relative;
z-index:2;

}

h1{

font-size:22px;

line-height:1.8;

color:#333;

}

p{

margin-top:25px;

font-size:12px;

line-height:2;

color:#666;

}

button{

margin-top:30px;

padding:18px 35px;

border:none;

border-radius:50px;

background:#59c173;

color:white;

font-size:13px;

cursor:pointer;

font-family:'Press Start 2P', cursive;

transition:.3s;

}

button:hover{

transform:scale(1.08);

}

@keyframes pop{

from{

opacity:0;

transform:scale(.5);

}

to{

opacity:1;

transform:scale(1);

}

}
.balloon{
    position:fixed;
    font-size:55px;
    animation:balloonFloat 8s ease-in-out infinite;
    z-index:1;
}

.balloon1{
    left:5%;
    bottom:-40px;
}

.balloon2{
    left:85%;
    bottom:-20px;
    animation-delay:2s;
}

.balloon3{
    left:20%;
    bottom:-60px;
    animation-delay:4s;
}

.balloon4{
    left:70%;
    bottom:-30px;
    animation-delay:1s;
}

@keyframes balloonFloat{

0%{
transform:translateY(0px);
}

50%{
transform:translateY(-60px);
}

100%{
transform:translateY(0px);
}

}
.sparkle{
    position:fixed;
    font-size:35px;
    animation:float 3s ease-in-out infinite;
    z-index:5;
}

@keyframes float{
0%{
transform:translateY(0px);
}

50%{
transform:translateY(-15px);
}

100%{
transform:translateY(0px);
}


</style>

</head>

<body>

<div class="card">

<h1>
HEY IDIOT 👀
</h1>

<p>
Yes, I'm talking to you.<br><br>

Before you celebrate your birthday...<br><br>

You have one tiny mission to complete.<br><br>

Don't worry... it's worth it. 🎁
</p>

<button onclick="start()">
BEGIN THE MISSION 🎮
</button>

</div>

<script>

function start(){

alert("Welcome to your Birthday Adventure! 🎉");

}

</script>


<div class="sparkle" style="top:10%;left:8%;">✨</div>
<div class="sparkle" style="top:20%;right:12%;">⭐</div>
<div class="sparkle" style="top:75%;left:10%;">🌸</div>
<div class="sparkle" style="top:80%;right:8%;">🫧</div>
<div class="sparkle" style="top:50%;left:3%;">💖</div>
<div class="sparkle" style="top:45%;right:5%;">🌼</div>
<div class="balloon balloon1">🎈</div>
<div class="balloon balloon2">🎈</div>
<div class="balloon balloon3">🎈</div>
<div class="balloon balloon4">🎈</div>
<script src="script.js"></script>
</body>

</html>
